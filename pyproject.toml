[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "PyProxySwitch"
version = "3.8.0"
description = "A cross-platform proxy switcher based on 3proxy, polipo and IP Relay"
authors = [
    {name = "Kder Lin", email = "kderlin@gmail.com"}
]
license = {text = "Apache License, Version 2.0"}
readme = "README_zh_CN.txt"
requires-python = ">=3.9"
keywords = ["proxy", "network", "tool"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Win32 (MS Windows)",
    "Environment :: X11 Applications :: Qt",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Internet :: Proxy Servers",
    "Topic :: System :: Networking",
]

dependencies = [
    "PySide6>=6.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pylint>=2.15.0",
    "mypy>=0.991",
    "flake8>=5.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--verbose --ignore=tests/test_main.py"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
]

[tool.coverage.report]
precision = 2
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
ignore_errors = true

[project.urls]
Homepage = "http://pyproxyswitch.kder.info"
Repository = "https://github.com/kderlin/PyProxySwitch"
"Bug Reports" = "https://github.com/kderlin/PyProxySwitch/issues"

[project.gui-scripts]
pyproxyswitch = "PyProxySwitch.src.main:main"

[tool.setuptools]
packages = ["PyProxySwitch", "PyProxySwitch.src", "PyProxySwitch.res"]
package-dir = {"" = "."}
include-package-data = true

[tool.setuptools.package-data]
"PyProxySwitch" = [
    "i18n/*.qm",
    "i18n/*.ts",
    "i18n/**/*.mo",
    "i18n/**/*.po",
    "img/*.ico",
    "img/*.png",
    "cfg/*.conf",
    "cfg/*.example",
    "cfg/*.txt",
    "cfg/**/*.conf",
    "bin/**/*",
    "licenses/*",
    "res/*",
]

[tool.black]
line-length = 88
target-version = ["py39"]
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | \.claude
  | _build
  | buck-out
  | build
  | dist
  | utils
  | __pycache__
)/
'''

[tool.pylint.messages_control]
disable = [
    "C0111",  # missing-docstring
    "C0103",  # invalid-name
    "R0903",  # too-few-public-methods
]

[tool.pylint.format]
max-line-length = 88

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true